apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: dev04
data:
  nginx.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      
      location /api/ {
        proxy_pass http://backend-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
      
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
